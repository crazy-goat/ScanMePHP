name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      has-permissions: ${{ steps.check.outputs.has-permissions }}
    steps:
      - name: Check if actor has write permissions
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const owner = context.repo.owner;
            
            // Always allow repo owner
            if (actor === owner) {
              core.setOutput('has-permissions', 'true');
              return;
            }
            
            // Check if actor has write permissions
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor
              });
              
              const allowedPermissions = ['admin', 'write', 'maintain'];
              if (allowedPermissions.includes(permission.permission)) {
                core.setOutput('has-permissions', 'true');
              } else {
                core.setOutput('has-permissions', 'false');
                core.info(`User ${actor} has permission level: ${permission.permission}. Skipping CI.`);
              }
            } catch (error) {
              core.setOutput('has-permissions', 'false');
              core.info(`Could not verify permissions for ${actor}. Skipping CI.`);
            }

  test:
    needs: check-permissions
    if: needs.check-permissions.outputs.has-permissions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        coverage: xdebug
        extensions: ffi, gd

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ make

    - name: Build C++ FFI library
      working-directory: clib
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
        make -j$(nproc)
        ls -la libscanme_qr.so

    - name: Verify library location
      run: |
        ls -la clib/build/
        ls -la clib/build/libscanme_qr.so || echo "Library not found!"
        php -r "echo 'FFI extension: ' . (extension_loaded('ffi') ? 'YES' : 'NO') . PHP_EOL;"
        php -r "echo 'Library exists: ' . (file_exists('clib/build/libscanme_qr.so') ? 'YES' : 'NO') . PHP_EOL;"

    - name: Run test suite
      run: composer run-script test

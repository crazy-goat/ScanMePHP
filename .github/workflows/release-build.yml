name: Build FFI Library and PHP Extension on Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # FFI Library Builds
  build-ffi-linux:
    name: Build FFI Linux ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: glibc
            container: ubuntu:22.04
            cxx_flags: ""
          - variant: musl
            container: alpine:latest
            cxx_flags: "-static-libgcc -static-libstdc++"
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.variant == 'glibc'
        run: |
          apt-get update
          apt-get install -y cmake g++ make

      - name: Install dependencies (Alpine)
        if: matrix.variant == 'musl'
        run: |
          apk add --no-cache cmake g++ make linux-headers

      - name: Build library
        working-directory: clib
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF \
            -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}"
          make -j$(nproc)

      - name: Rename artifact
        working-directory: clib/build
        run: |
          cp libscanme_qr.so "libscanme_qr-linux-${{ matrix.variant }}-x86_64.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffi-linux-${{ matrix.variant }}-x86_64
          path: clib/build/libscanme_qr-linux-${{ matrix.variant }}-x86_64.so

  build-ffi-macos:
    name: Build FFI macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Build library
        working-directory: clib
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}"
          make -j$(sysctl -n hw.ncpu)

      - name: Rename artifact
        working-directory: clib/build
        run: |
          cp libscanme_qr.dylib "libscanme_qr-macos-${{ matrix.arch }}.dylib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffi-macos-${{ matrix.arch }}
          path: clib/build/libscanme_qr-macos-${{ matrix.arch }}.dylib

  build-ffi-windows:
    name: Build FFI Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        working-directory: clib
        run: |
          cmake -B build -S . -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTS=OFF

      - name: Build library
        working-directory: clib
        run: |
          cmake --build build --config Release

      - name: Rename artifact
        working-directory: clib/build/Release
        run: |
          copy scanme_qr.dll scanme_qr-windows-x86_64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffi-windows-x86_64
          path: clib/build/Release/scanme_qr-windows-x86_64.dll

  # PHP Extension Builds
  build-ext-linux:
    name: Build PHP-Ext Linux ${{ matrix.variant }} PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: glibc
            container: ubuntu:22.04
            php-version: '8.1'
          - variant: glibc
            container: ubuntu:22.04
            php-version: '8.2'
          - variant: glibc
            container: ubuntu:22.04
            php-version: '8.3'
          - variant: glibc
            container: ubuntu:22.04
            php-version: '8.4'
          - variant: musl
            container: alpine:3.19
            php-version: '8.1'
          - variant: musl
            container: alpine:3.19
            php-version: '8.2'
          - variant: musl
            container: alpine:3.19
            php-version: '8.3'
          - variant: musl
            container: alpine:3.19
            php-version: '8.4'
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.variant == 'glibc'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export TZ=UTC
          apt-get update
          apt-get install -y cmake g++ make software-properties-common
          add-apt-repository -y ppa:ondrej/php
          apt-get update
          apt-get install -y php${{ matrix.php-version }}-dev

      - name: Install dependencies (Alpine)
        if: matrix.variant == 'musl'
        run: |
          export TZ=UTC
          apk add --no-cache cmake g++ make linux-headers
          # Install PHP dev from edge repository
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
          # Alpine uses different naming: php81-dev instead of php8.1-dev
          ALPINE_PHP_VERSION=$(echo "${{ matrix.php-version }}" | tr -d '.')
          apk add --no-cache php${ALPINE_PHP_VERSION}-dev

      - name: Build FFI library (dependency)
        working-directory: clib
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          make -j$(nproc)

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          if [ "${{ matrix.variant }}" = "musl" ]; then
            # Alpine uses different naming: phpize81 instead of phpize8.1
            ALPINE_PHP_VERSION=$(echo "${{ matrix.php-version }}" | tr -d '.')
            phpize${ALPINE_PHP_VERSION}
            ./configure --with-php-config=/usr/bin/php-config${ALPINE_PHP_VERSION} --with-scanmeqr="$GITHUB_WORKSPACE/clib"
          else
            phpize${{ matrix.php-version }}
            ./configure --with-php-config=/usr/bin/php-config${{ matrix.php-version }} --with-scanmeqr="$GITHUB_WORKSPACE/clib"
          fi
          make -j$(nproc)

      - name: Rename artifact
        working-directory: php-ext/modules
        run: |
          cp scanmeqr.so "php-ext-linux-${{ matrix.variant }}-x86_64-php${{ matrix.php-version }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ext-linux-${{ matrix.variant }}-x86_64-php${{ matrix.php-version }}
          path: php-ext/modules/php-ext-linux-${{ matrix.variant }}-x86_64-php${{ matrix.php-version }}.so

  build-ext-macos:
    name: Build PHP-Ext macOS ${{ matrix.arch }} PHP ${{ matrix.php-version }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
        php-version: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Build FFI library (dependency)
        working-directory: clib
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}"
          make -j$(sysctl -n hw.ncpu)

      - name: Build PHP extension
        working-directory: php-ext
        run: |
          phpize
          ./configure --with-scanmeqr="$GITHUB_WORKSPACE/clib"
          make -j$(sysctl -n hw.ncpu)

      - name: Rename artifact
        working-directory: php-ext/modules
        run: |
          cp scanmeqr.so "php-ext-macos-${{ matrix.arch }}-php${{ matrix.php-version }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ext-macos-${{ matrix.arch }}-php${{ matrix.php-version }}
          path: php-ext/modules/php-ext-macos-${{ matrix.arch }}-php${{ matrix.php-version }}.so

  release:
    name: Create Release
    needs: [build-ffi-linux, build-ffi-macos, build-ffi-windows, build-ext-linux, build-ext-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## FFI Library Binaries

            Prebuilt binaries for the ScanMePHP FFI library are attached to this release:

            - `libscanme_qr-linux-glibc-x86_64.so` - Linux with glibc (Ubuntu, Debian, etc.)
            - `libscanme_qr-linux-musl-x86_64.so` - Linux with musl (Alpine Linux)
            - `libscanme_qr-macos-x86_64.dylib` - macOS Intel
            - `libscanme_qr-macos-arm64.dylib` - macOS Apple Silicon
            - `scanme_qr-windows-x86_64.dll` - Windows x86_64

            ### Installation

            Download the appropriate binary for your platform and place it in your project directory. The PHP FFI encoder will automatically detect and load it.

            ## PHP Extension Binaries

            Precompiled PHP extension binaries are attached to this release for PHP 8.1, 8.2, 8.3, and 8.4:

            **Linux (glibc)** - Ubuntu, Debian, etc.:
            - `php-ext-linux-glibc-x86_64-php81.so` - PHP 8.1
            - `php-ext-linux-glibc-x86_64-php82.so` - PHP 8.2
            - `php-ext-linux-glibc-x86_64-php83.so` - PHP 8.3
            - `php-ext-linux-glibc-x86_64-php84.so` - PHP 8.4

            **Linux (musl)** - Alpine Linux:
            - `php-ext-linux-musl-x86_64-php81.so` - PHP 8.1
            - `php-ext-linux-musl-x86_64-php82.so` - PHP 8.2
            - `php-ext-linux-musl-x86_64-php83.so` - PHP 8.3
            - `php-ext-linux-musl-x86_64-php84.so` - PHP 8.4

            **macOS Intel**:
            - `php-ext-macos-x86_64-php81.so` - PHP 8.1
            - `php-ext-macos-x86_64-php82.so` - PHP 8.2
            - `php-ext-macos-x86_64-php83.so` - PHP 8.3
            - `php-ext-macos-x86_64-php84.so` - PHP 8.4

            **macOS Apple Silicon**:
            - `php-ext-macos-arm64-php81.so` - PHP 8.1
            - `php-ext-macos-arm64-php82.so` - PHP 8.2
            - `php-ext-macos-arm64-php83.so` - PHP 8.3
            - `php-ext-macos-arm64-php84.so` - PHP 8.4

            ### Installation

            **Option 1: Composer (Recommended)**
            ```bash
            composer require crazy-goat/scanmephp
            ```
            The Composer plugin will automatically download the correct binary for your PHP version.

            **Option 2: Manual**
            1. Download the appropriate binary for your platform and PHP version
            2. Place it in your PHP extensions directory (check `php-config --extension-dir`)
            3. Add `extension=scanmeqr.so` to your php.ini
            4. Restart your web server or PHP-FPM

            ### PHP Version Compatibility

            | PHP Version | Linux glibc | Linux musl | macOS x86_64 | macOS arm64 |
            |-------------|-------------|------------|--------------|-------------|
            | 8.1 | ✅ | ✅ | ✅ | ✅ |
            | 8.2 | ✅ | ✅ | ✅ | ✅ |
            | 8.3 | ✅ | ✅ | ✅ | ✅ |
            | 8.4 | ✅ | ✅ | ✅ | ✅ |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
